<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password" oninput="checkPasswordStrength()">
            <button type="submit"><i class="fa-solid fa-arrow-right-to-bracket"></i></button>
            <p id="message"><span id="strength"></span></p>
        </div>
    </div>


    <script src="https://kit.fontawesome.com/bf4fb55ec5.js" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js" integrity="sha256-8DGpv13HIm+5iDNWw1XqxgFB4mj+yOKFNb+tHBZOowc=" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>
</html>
